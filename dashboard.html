<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>LLM Credits Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.7/dist/chart.umd.min.js"></script>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0820;
    color: #c8c0d0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 40px 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-size: 28px;
    background: linear-gradient(135deg, #c8b080, #a064ff);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle { color: #706080; font-size: 14px; margin-bottom: 16px; }

  /* Preferences bar */
  .prefs {
    display: flex;
    gap: 12px;
    align-items: center;
    margin-bottom: 24px;
    flex-wrap: wrap;
  }
  .pref-group {
    display: flex;
    align-items: center;
    gap: 6px;
    background: rgba(20,15,40,0.5);
    border: 1px solid rgba(160,100,255,0.08);
    border-radius: 10px;
    padding: 8px 14px;
  }
  .pref-group label {
    font-size: 12px;
    color: #605070;
    text-transform: uppercase;
    letter-spacing: 1px;
  }
  .pref-group select {
    background: rgba(10,8,32,0.8);
    color: #c8c0d0;
    border: 1px solid rgba(160,100,255,0.15);
    border-radius: 6px;
    padding: 4px 8px;
    font-size: 13px;
    cursor: pointer;
    outline: none;
  }
  .pref-group select:hover {
    border-color: rgba(160,100,255,0.3);
  }
  .pref-group select option {
    background: #0a0820;
    color: #c8c0d0;
  }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }
  .card {
    background: rgba(20, 15, 40, 0.7);
    border: 1px solid rgba(160, 100, 255, 0.1);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
  }
  .card .value { font-size: 32px; font-weight: 700; margin-top: 4px; }
  .card .label { font-size: 12px; color: #706080; text-transform: uppercase; letter-spacing: 2px; }
  .green { color: #50d890; }
  .gold { color: #c8b080; }
  .cyan { color: #50dcff; }
  .magenta { color: #ff70b4; }
  .chart-row {
    display: grid;
    grid-template-columns: 2fr 1fr;
    gap: 20px;
    margin-bottom: 20px;
  }
  .chart-box {
    background: rgba(20, 15, 40, 0.5);
    border: 1px solid rgba(160, 100, 255, 0.08);
    border-radius: 16px;
    padding: 20px;
  }
  .chart-box.full { grid-column: 1 / -1; }
  .chart-box h3 {
    font-size: 14px; color: #9080a0; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 16px;
  }
  .chart-box canvas { width: 100% !important; height: auto !important; max-height: 350px; }
  .table-wrap { overflow-x: auto; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 12px; color: #605080;
    text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
    border-bottom: 1px solid rgba(160,100,255,0.08);
  }
  td {
    padding: 8px 12px; border-bottom: 1px solid rgba(160,100,255,0.04); color: #a098b0;
  }
  td.cost { color: #c8b080; font-weight: 600; text-align: right; }
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 100px;
    font-size: 11px; background: rgba(160,100,255,0.1); color: #a064ff;
  }
  .loading { text-align: center; padding: 80px 20px; color: #504060; }
  .loading .spinner { font-size: 40px; margin-bottom: 16px; animation: spin 2s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .error { text-align: center; padding: 60px; color: #805050; }
  .updated { color: #504060; font-size: 12px; text-align: center; margin-top: 20px; }
  @media (max-width: 700px) { .chart-row { grid-template-columns: 1fr; } }
</style>
</head>
<body>
<div class="container">
  <h1>LLM Credits Tracker</h1>
  <p class="subtitle">Real-time spending tracker</p>

  <div class="prefs">
    <div class="pref-group">
      <label for="tzSelect">Timezone</label>
      <select id="tzSelect" onchange="onPrefChange()">
        <option value="Asia/Hong_Kong">Hong Kong (UTC+8)</option>
        <option value="Asia/Tokyo">Tokyo (UTC+9)</option>
        <option value="Asia/Singapore">Singapore (UTC+8)</option>
        <option value="Asia/Shanghai">Shanghai (UTC+8)</option>
        <option value="America/New_York">New York (UTC-5)</option>
        <option value="America/Los_Angeles">Los Angeles (UTC-8)</option>
        <option value="Europe/London">London (UTC+0)</option>
        <option value="Europe/Berlin">Berlin (UTC+1)</option>
        <option value="Pacific/Auckland">Auckland (UTC+12)</option>
        <option value="UTC">UTC</option>
      </select>
    </div>
    <div class="pref-group">
      <label for="ccySelect">Currency</label>
      <select id="ccySelect" onchange="onPrefChange()">
        <option value="HKD">HK$ HKD</option>
        <option value="USD">$ USD</option>
        <option value="CNY">¥ CNY</option>
        <option value="EUR">€ EUR</option>
        <option value="JPY">¥ JPY</option>
        <option value="GBP">£ GBP</option>
        <option value="SGD">S$ SGD</option>
      </select>
    </div>
  </div>

  <div id="loading" class="loading">
    <div class="spinner">⌛</div>
    Loading latest cost data...
  </div>

  <div id="content" style="display:none">
    <span id="pageLoadedAt" style="display:none"><script>document.write(Date.now())</script></span>
    <div class="cards" id="summaryCards"></div>
    <div class="chart-row">
      <div class="chart-box">
        <h3>Daily Spending & Cumulative</h3>
        <canvas id="dailyChart"></canvas>
      </div>
      <div class="chart-box">
        <h3>By Task Type</h3>
        <canvas id="typeChart"></canvas>
      </div>
    </div>
    <div class="chart-box full">
      <h3>Top 10 Most Expensive Tasks</h3>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Rank</th><th>Date</th><th>Cost</th><th>Description</th><th>Tokens</th><th>Task ID</th>
          </tr></thead>
          <tbody id="topTasksTable"></tbody>
        </table>
      </div>
    </div>
    <div class="chart-box full">
      <h3>Task History</h3>
      <div class="table-wrap">
        <table>
          <thead><tr>
            <th>Date</th><th>Task ID</th><th>Type</th>
            <th>Description</th><th>Tokens</th><th>Cost</th>
          </tr></thead>
          <tbody id="taskTable"></tbody>
        </table>
      </div>
    </div>
    <p class="updated" id="updatedAt"></p>
  </div>

  <div id="error" class="error" style="display:none"></div>
</div>

<script>
// ── Preferences ──
const CURRENCY_RATES = {
  USD: 1,     HKD: 7.8,  CNY: 7.2,
  EUR: 0.92,  JPY: 158,  GBP: 0.79,  SGD: 1.34
};
const CURRENCY_SYMS = {
  USD: '$', HKD: 'HK$', CNY: '¥', EUR: '€', JPY: '¥', GBP: '£', SGD: 'S$'
};

function getPref(key, fallback) {
  return localStorage.getItem('tracker_' + key) || fallback;
}
function setPref(key, val) {
  localStorage.setItem('tracker_' + key, val);
}

function applyPrefs() {
  var tz = getPref('timezone', 'Asia/Hong_Kong');
  var ccy = getPref('currency', 'HKD');
  document.getElementById('tzSelect').value = tz;
  document.getElementById('ccySelect').value = ccy;
}

function onPrefChange() {
  var tz = document.getElementById('tzSelect').value;
  var ccy = document.getElementById('ccySelect').value;
  setPref('timezone', tz);
  setPref('currency', ccy);
  // Re-render with new settings
  if (window._lastData) render(window._lastData);
}

function fmtDate(dateStr, tz) {
  var d = new Date(dateStr + 'T00:00:00Z');
  try {
    return d.toLocaleDateString('en-CA', { timeZone: tz, year:'numeric', month:'2-digit', day:'2-digit' });
  } catch(e) {
    return dateStr;
  }
}

function fmtCost(usd, ccy) {
  var rate = CURRENCY_RATES[ccy] || 1;
  var sym = CURRENCY_SYMS[ccy] || '$';
  var val = usd * rate;
  if (ccy === 'JPY') return sym + ' ' + Math.round(val).toLocaleString();
  if (ccy === 'HKD') return sym + ' ' + val.toFixed(4);
  return sym + ' ' + val.toFixed(4);
}

function fmtCostShort(usd, ccy) {
  var rate = CURRENCY_RATES[ccy] || 1;
  var sym = CURRENCY_SYMS[ccy] || '$';
  var val = usd * rate;
  if (ccy === 'JPY') return sym + ' ' + Math.round(val).toLocaleString();
  return sym + ' ' + val.toFixed(2);
}

// ── Data Loading ──
async function loadData() {
  try {
    var cacheBuster = '?_=' + Date.now();
    var resp = await fetch("https://leolau.github.io/pu-toolbox/data.json" + cacheBuster);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    window._lastData = data;
    
    // Auto-refresh if this page was loaded before data was updated
    var pageLoadedAt = document.getElementById('pageLoadedAt');
    var loadTime = pageLoadedAt ? parseInt(pageLoadedAt.textContent) : 0;
    var dataTime = new Date(data.updated_at + ' UTC').getTime();
    // If page was loaded more than 60s before data was updated, refresh
    if (dataTime > 0 && loadTime > 0 && (dataTime - loadTime) > 60000) {
      console.log('Stale page detected, refreshing...');
      location.reload(true);
      return;
    }
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML =
      '<div style="font-size:40px;margin-bottom:12px">⚠️</div>' +
      '<p>Could not load cost data.</p><p style="font-size:12px;margin-top:8px">' + e.message + '</p>' +
      '<p style="margin-top:20px"><a href="javascript:location.reload()" style="color:#a064ff">Retry</a></p>';
  }
}

function render(data) {
  applyPrefs();
  var tz = getPref('timezone', 'Asia/Hong_Kong');
  var ccy = getPref('currency', 'HKD');
  var s = data.summary;

  // ── Summary cards ──
  document.getElementById('summaryCards').innerHTML =
    '<div class="card"><div class="label">Current Balance</div><div class="value green">' +
    fmtCostShort(s.balance != null ? s.balance : 0, ccy) + '</div></div>' +
    '<div class="card"><div class="label">Total Spent</div><div class="value gold">' +
    fmtCostShort(s.total_cost, ccy) + '</div></div>' +
    '<div class="card"><div class="label">Total Tasks</div><div class="value cyan">' +
    s.total_tasks + '</div></div>' +
    '<div class="card"><div class="label">Tokens Used</div><div class="value magenta">' +
    s.total_tokens.toLocaleString() + '</div></div>';

  // ── Daily chart ──
  var dailyData = data.daily;
  var ccyLabel = ccy === 'HKD' ? 'HK$' : (CURRENCY_SYMS[ccy] || '$');

  if (window._dailyChart) window._dailyChart.destroy();
  window._dailyChart = new Chart(document.getElementById('dailyChart'), {
    type: 'bar',
    data: {
      labels: dailyData.map(function(d) { return fmtDate(d[0], tz); }),
      datasets: [{
        label: 'Daily (' + ccyLabel + ')',
        data: dailyData.map(function(d) { return d[1] * (CURRENCY_RATES[ccy] || 1); }),
        backgroundColor: 'rgba(200,176,128,0.3)',
        borderColor: '#c8b080', borderWidth: 1, borderRadius: 4, order: 2
      }, {
        label: 'Cumulative (' + ccyLabel + ')',
        data: dailyData.map(function(d) { return d[2] * (CURRENCY_RATES[ccy] || 1); }),
        borderColor: '#50dcff', backgroundColor: 'rgba(80,220,255,0.05)',
        fill: true, tension: 0.3, pointRadius: 4, pointBackgroundColor: '#50dcff', order: 1
      }]
    },
    options: {
      responsive: true, interaction: { mode: 'index', intersect: false },
      plugins: { legend: { labels: { color: COLORS.text, font: { size: 11 } } } },
      scales: {
        x: { grid: { color: COLORS.grid }, ticks: { color: COLORS.text, font: { size: 11 } } },
        y: { beginAtZero: true, grid: { color: COLORS.grid },
          ticks: { color: COLORS.text, font: { size: 11 },
            callback: function(v) { return ccyLabel + ' ' + v.toFixed(4); } } }
      }
    }
  });

  // ── Type pie chart ──
  var typeData = data.by_type;
  var typeColors = ['#a064ff', '#50dcff', '#c8b080', '#50d890', '#ff70b4', '#ffc850'];

  if (window._typeChart) window._typeChart.destroy();
  window._typeChart = new Chart(document.getElementById('typeChart'), {
    type: 'doughnut',
    data: {
      labels: typeData.map(function(d) { return d.type; }),
      datasets: [{
        data: typeData.map(function(d) { return d.cost; }),
        backgroundColor: typeColors.slice(0, typeData.length),
        borderColor: '#0a0820', borderWidth: 2
      }]
    },
    options: {
      responsive: true, maintainAspectRatio: true,
      plugins: {
        legend: { position: 'bottom', labels: { color: COLORS.text, font: { size: 11 }, padding: 12 } },
        tooltip: {
          callbacks: {
            label: function(ctx) {
              var d = typeData[ctx.dataIndex];
              return d.type + ': ' + d.count + ' tasks, ' + fmtCostShort(d.cost, ccy);
            }
          }
        }
      }
    }
  });

  // ── Task table ──
  var tableHtml = '';
  data.tasks.forEach(function(t) {
    tableHtml += '<tr>' +
      '<td>' + fmtDate(t.date, tz) + '</td>' +
      '<td>' + t.id + '</td>' +
      '<td><span class="tag">' + t.type.charAt(0).toUpperCase() + t.type.slice(1) + '</span></td>' +
      '<td>' + t.desc + '</td>' +
      '<td>' + t.tokens.toLocaleString() + '</td>' +
      '<td class="cost">' + fmtCost(t.cost, ccy) + '</td>' +
      '</tr>';
  });
  document.getElementById('taskTable').innerHTML = tableHtml;

  // ── Top 10 most expensive tasks ──
  var sortedByCost = data.tasks.slice().sort(function(a, b) { return b.cost - a.cost; });
  var top10 = sortedByCost.slice(0, 10);
  var topHtml = '';
  top10.forEach(function(t, i) {
    var medal = '';
    if (i === 0) medal = '🥇 ';
    else if (i === 1) medal = '🥈 ';
    else if (i === 2) medal = '🥉 ';
    topHtml += '<tr>' +
      '<td>' + medal + (i + 1) + '</td>' +
      '<td>' + fmtDate(t.date, tz) + '</td>' +
      '<td class="cost">' + fmtCost(t.cost, ccy) + '</td>' +
      '<td>' + t.desc + '</td>' +
      '<td>' + t.tokens.toLocaleString() + '</td>' +
      '<td>' + t.id + '</td>' +
      '</tr>';
  });
  if (top10.length === 0) {
    topHtml = '<tr><td colspan="6" style="text-align:center;color:#504060;padding:20px">No tasks yet</td></tr>';
  }
  document.getElementById('topTasksTable').innerHTML = topHtml;

  // ── Timestamp ──
  document.getElementById('updatedAt').textContent = 'Last updated: ' + (data.updated_at || 'unknown') +
    ' · Preferences saved locally';
}

// ── Init ──
const COLORS = {
  gold: '#c8b080', cyan: '#50dcff', magenta: '#ff70b4',
  green: '#50d890', purple: '#a064ff',
  grid: 'rgba(160,100,255,0.06)', text: '#706080'
};

applyPrefs();
loadData();
</script>
</body>
</html>
