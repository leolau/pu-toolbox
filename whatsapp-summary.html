<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0820;

  .container { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-size: 28px;

    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;

  .updated { color: #504060; font-size: 12px; text-align: center; margin-bottom: 30px; }

  /* Summary cards */
  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }
  .card {

    border-radius: 16px;
    padding: 24px;
    text-align: center;

  .card .label { font-size: 12px; color: #706080; text-transform: uppercase; letter-spacing: 2px; }
  .green { color: #25D366; }
  .gold { color: #c8b080; }
  .cyan { color: #50dcff; }
  .magenta { color: #ff70b4; }
  .whatsapp-green { color: #25D366; }

  /* Period breakdown */
  .periods {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .period-box {
    background: rgba(20, 15, 40, 0.5);
    border: 1px solid rgba(160, 100, 255, 0.08);
    border-radius: 16px;
    padding: 20px;

  .period-box h3 {

    letter-spacing: 2px; margin-bottom: 12px;
  }
  .period-box .count {
    font-size: 24px; font-weight: 700; color: #25D366; margin-bottom: 12px;
  }
  .sender-list { list-style: none; }
  .sender-list li {
    display: flex; justify-content: space-between; align-items: center;
    padding: 6px 0; border-bottom: 1px solid rgba(160,100,255,0.04);
    font-size: 13px;
  }
  .sender-list li:last-child { border-bottom: none; }
  .sender-list .name { color: #d0c8e0; }
  .sender-list .num { color: #25D366; font-weight: 600; }
  .sender-list .count-badge {
    background: rgba(37, 211, 102, 0.1);
    color: #25D366;
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }
  .sender-list li { padding: 8px 0; }

  /* Messages table */
  .section-title {
    font-size: 14px; color: #9080a0; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 16px; margin-top: 10px;
  }
  .table-wrap { overflow-x: auto; margin-bottom: 30px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 12px; color: #605080;
    text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
    border-bottom: 1px solid rgba(160,100,255,0.08);
    white-space: nowrap;
  }
  td {
    padding: 8px 12px; border-bottom: 1px solid rgba(160,100,255,0.04); color: #a098b0;
    vertical-align: top;
  }
  td.msg-text { max-width: 400px; word-break: break-word; }
  td.media-indicator { color: #50dcff; }
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 100px;
    font-size: 11px; background: rgba(160,100,255,0.1); color: #a064ff;
  }
  .tag.group { background: rgba(37,211,102,0.1); color: #25D366; }
  .sender-name { color: #d0c8e0; font-weight: 500; }
  .no-data { text-align: center; color: #504060; padding: 40px; }
</style>
</head>

// ── Helpers ──
const NOW = new Date('2026-07-01T12:53:00Z');
const SEVEN_DAYS_AGO = new Date(NOW.getTime() - 7 * 86400000);
const FOUR_WEEKS_AGO = new Date(NOW.getTime() - 28 * 86400000);
const SIX_MONTHS_AGO = new Date(NOW.getTime() - 180 * 86400000);

function fmtTime(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleString('en-CA', { timeZone:'Asia/Hong_Kong',
    year:'numeric', month:'2-digit', day:'2-digit',
    hour:'2-digit', minute:'2-digit' });
}

function fmtDateShort(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleString('en-CA', { timeZone:'Asia/Hong_Kong',
    month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function topSenders(messages) {
  const map = {};
  for (const m of messages) {
    const name = m.sender?.name || m.raw?.senderName || 'Unknown';
    const senderId = m.raw?.senderId || m.sender?.id || '';
    const chatName = m.raw?.chatName || m.chat?.id || '';
    const isGroup = m.raw?.isGroup || m.chat?.is_group || false;
    const body = m.raw?.body || m.message?.text || '';
    const ts = m.timestamp || 0;
    const key = name + '::' + senderId;
    if (!map[key]) {
      map[key] = { count: 0, chatName, isGroup, lastMsg: body, lastTs: ts };
    }
    map[key].count += 1;
    if (ts > map[key].lastTs) {
      map[key].lastMsg = body;
      map[key].lastTs = ts;
    }
  }
  return Object.entries(map)
    .sort((a, b) => b[1].count - a[1].count)
    .slice(0, 5)
    .map(([key, info]) => {
      const [name, id] = key.split('::');
      const number = id.replace(/@.*/, '');
      return { name, number, ...info };
    });
}

// ── Render ──
function render() {
  const messages = MESSAGES_DATA;
  const total = messages.length;
  const withMedia = messages.filter(m => m.raw?.hasMedia || m.message?.type === 'image' || m.message?.text?.startsWith('[image')).length;
  const uniqueSenders = new Set(messages.map(m => m.raw?.senderName || m.sender?.name || 'Unknown')).size;
  const uniqueChats = new Set(messages.map(m => m.chat?.id || m.raw?.chatId)).size;

  // Summary cards
  document.getElementById('summaryCards').innerHTML =
    '<div class="card"><div class="label">Total Messages</div><div class="value green">' + total + '</div></div>' +
    '<div class="card"><div class="label">With Media</div><div class="value cyan">' + withMedia + '</div></div>' +
    '<div class="card"><div class="label">Unique Senders</div><div class="value gold">' + uniqueSenders + '</div></div>' +
    '<div class="card"><div class="label">Chats</div><div class="value magenta">' + uniqueChats + '</div></div>';

  // Period breakdown
  const periods = [
    { label: 'Past 7 Days', cutoff: SEVEN_DAYS_AGO, id: '7d' },
    { label: 'Past 4 Weeks', cutoff: FOUR_WEEKS_AGO, id: '4w' },
    { label: 'Past 6 Months', cutoff: SIX_MONTHS_AGO, id: '6m' },
  ];

  let periodsHtml = '';
  for (const p of periods) {
    const filtered = messages.filter(m => new Date(m.timestamp * 1000) >= p.cutoff);
    const senders = topSenders(filtered);
    let listHtml = '';
    if (senders.length === 0) {
      listHtml = '<li class="no-data">No messages</li>';
    } else {
      for (const s of senders) {
        listHtml += '<li><div style="display:flex;flex-direction:column;gap:2px;width:100%">' +
        '<div style="display:flex;justify-content:space-between;align-items:center">' +
        '<span class="name">' + escapeHtml(s.name) + '</span>' +
        '<span class="count-badge">' + s.count + '</span></div>' +
        '<div style="display:flex;justify-content:space-between;font-size:11px;color:#605070">' +
        '<span>' + (s.isGroup ? '👥 Group' : '💬 DM') + '</span>' +
        '<span style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
        escapeHtml((s.lastMsg || '').substring(0, 40)) + '</span></div></div></li>';
      }
    }
    periodsHtml += '<div class="period-box">' +
      '<h3>' + p.label + '</h3>' +
      '<div class="count">' + filtered.length + ' messages</div>' +
      '<ul class="sender-list">' + listHtml + '</ul>' +
      '</div>';
  }
  document.getElementById('periodsContainer').innerHTML = periodsHtml;

  // Last 30 messages
  const last30 = messages.slice(-30).reverse();
  let tableHtml = '';
  for (const m of last30) {
    const ts = m.timestamp || (new Date(m.received_at).getTime() / 1000);
    const senderName = m.raw?.senderName || m.sender?.name || 'Unknown';
    const senderNum = (m.raw?.senderId || m.sender?.id || '').replace(/@.*/, '');
    const chatName = m.raw?.chatName || m.chat?.id || '';
    const isGroup = m.raw?.isGroup || m.chat?.is_group || false;
    const text = m.raw?.body || m.message?.text || '';
    const hasMedia = m.raw?.hasMedia || m.message?.type === 'image' || text.startsWith('[image') || text.startsWith('[video') || text.startsWith('[audio');
    const mediaType = m.raw?.mediaType || '';
    const displayText = text.length > 120 ? text.substring(0, 120) + '…' : text;

    tableHtml += '<tr>' +
      '<td style="white-space:nowrap;font-size:12px">' + fmtDateShort(ts) + '</td>' +
      '<td><span class="sender-name">' + escapeHtml(senderName) + '</span>' +
      (senderNum ? '<br><span style="font-size:11px;color:#504060">' + senderNum + '</span>' : '') + '</td>' +
      '<td>' + (isGroup ? '<span class="tag group">Group</span>' : '<span class="tag">DM</span>') + '</td>' +
      '<td class="msg-text">' + escapeHtml(displayText) + '</td>' +
      '<td class="media-indicator">' + (hasMedia ? '📎 ' + (mediaType || 'media') : '—') + '</td>' +
      '</tr>';
  }
  if (last30.length === 0) {
    tableHtml = '<tr><td colspan="5" class="no-data">No messages yet</td></tr>';
  }
  document.getElementById('messagesTable').innerHTML = tableHtml;

  document.getElementById('updatedAt').textContent = 'Last updated: 2026-07-01 12:53 UTC · ' + total + ' messages captured';
}

render();
</script>
