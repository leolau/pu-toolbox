<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>WhatsApp Summary</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0820;
    color: #c8c0d0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
    padding: 40px 20px;
  }
  .container { max-width: 1100px; margin: 0 auto; }
  h1 {
    font-size: 28px;
    background: linear-gradient(135deg, #25D366, #128C7E);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 8px;
  }
  .subtitle { color: #706080; font-size: 14px; margin-bottom: 24px; }
  .updated { color: #504060; font-size: 12px; text-align: center; margin-bottom: 30px; }
  .back-link { display: inline-block; color: #25D366; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
  .back-link:hover { text-decoration: underline; }
  .loading { text-align: center; padding: 80px 20px; color: #504060; }
  .loading .spinner { font-size: 40px; margin-bottom: 16px; animation: spin 2s linear infinite; }
  @keyframes spin { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
  .error { text-align: center; padding: 60px; color: #805050; }

  .cards {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 16px;
    margin-bottom: 30px;
  }
  .card {
    background: rgba(20, 15, 40, 0.7);
    border: 1px solid rgba(160, 100, 255, 0.1);
    border-radius: 16px;
    padding: 24px;
    text-align: center;
  }
  .card .value { font-size: 32px; font-weight: 700; margin-top: 4px; }
  .card .label { font-size: 12px; color: #706080; text-transform: uppercase; letter-spacing: 2px; }
  .green { color: #25D366; }
  .gold { color: #c8b080; }
  .cyan { color: #50dcff; }
  .magenta { color: #ff70b4; }

  .periods {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
    gap: 20px;
    margin-bottom: 30px;
  }
  .period-box {
    background: rgba(20, 15, 40, 0.5);
    border: 1px solid rgba(160, 100, 255, 0.08);
    border-radius: 16px;
    padding: 20px;
  }
  .period-box h3 {
    font-size: 14px; color: #9080a0; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 12px;
  }
  .period-box .count {
    font-size: 24px; font-weight: 700; color: #25D366; margin-bottom: 12px;
  }
  .sender-list { list-style: none; }
  .sender-list li {
    padding: 8px 0; border-bottom: 1px solid rgba(160,100,255,0.04);
    font-size: 13px; cursor: pointer; border-radius: 8px; transition: background 0.15s;
  }
  .sender-list li:hover { background: rgba(37,211,102,0.05); }
  .sender-list li:last-child { border-bottom: none; }
  .sender-list .name { color: #d0c8e0; font-weight: 500; }
  .sender-list .name:hover { color: #25D366; }
  .sender-list .count-badge {
    background: rgba(37, 211, 102, 0.1);
    color: #25D366;
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }
  .phone-tag {
    display: inline-block; padding: 1px 8px; border-radius: 100px;
    font-size: 10px; background: rgba(37,211,102,0.08); color: #25D366;
    margin-left: 4px;
  }

  .section-title {
    font-size: 14px; color: #9080a0; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 16px; margin-top: 10px;
  }
  .table-wrap { overflow-x: auto; margin-bottom: 30px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 12px; color: #605080;
    text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
    border-bottom: 1px solid rgba(160,100,255,0.08);
    white-space: nowrap;
  }
  td {
    padding: 8px 12px; border-bottom: 1px solid rgba(160,100,255,0.04); color: #a098b0;
    vertical-align: top;
  }
  td.msg-text { max-width: 400px; word-break: break-word; white-space: pre-wrap; }
  td.media-indicator { color: #50dcff; }
  .media-link {
    color: #50dcff; text-decoration: none; font-size: 12px;
    display: inline-block; padding: 2px 8px; margin: 1px 0;
    background: rgba(80,220,255,0.08); border-radius: 4px;
  }
  .media-link:hover { background: rgba(80,220,255,0.2); text-decoration: underline; }
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 100px;
    font-size: 11px; background: rgba(160,100,255,0.1); color: #a064ff;
  }
  .chat-name { font-size: 12px; color: #706080; }
  .sender-name { color: #d0c8e0; font-weight: 500; }
  .no-data { text-align: center; color: #504060; padding: 40px; }
  .filter-hint { color: #504060; font-size: 12px; font-style: italic; margin-bottom: 8px; }
</style>
</head>
<body>
<div class="container" id="app">
  <h1>💬 WhatsApp Summary</h1>
  <p class="subtitle" id="subtitle">Incoming messages captured via WhatsApp bridge</p>
  <p class="updated" id="updatedAt"></p>

  <div id="loading" class="loading">
    <div class="spinner">⌛</div>
    Loading WhatsApp data...
  </div>

  <div id="content" style="display:none">
    <div class="cards" id="summaryCards"></div>

    <h2 class="section-title">📊 Period Breakdown</h2>
    <p class="filter-hint">Click a sender name to see their messages</p>
    <div class="periods" id="periodsContainer"></div>

    <h2 class="section-title" id="messagesTitle">📜 Recent Messages</h2>
    <div class="table-wrap" id="messagesWrap">
      <table>
        <thead><tr>
          <th>Time</th><th>Sender</th><th>Phone</th><th>Chat</th><th>Message</th><th>Media</th>
        </tr></thead>
        <tbody id="messagesTable"></tbody>
      </table>
    </div>
  </div>

  <div id="error" class="error" style="display:none"></div>
</div>

<script>
// Cache-busting URL for data
const DATA_URL = 'https://raw.githubusercontent.com/leolau/pu-toolbox/main/whatsapp-data.json?_=' + Date.now();

// ── Helpers ──
function fmtDateShort(ts) {
  var d = typeof ts === 'number' ? new Date(ts * 1000) : new Date(ts);
  if (isNaN(d.getTime())) d = new Date();
  return d.toLocaleString('en-CA', { timeZone:'Asia/Hong_Kong',
    month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(text) {
  var div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function getChatDisplay(m) {
  var chat = m.chat || {};
  var name = chat.name || chat.id || '';
  var isGroup = chat.is_group || false;
  return (isGroup ? '👥 ' : '💬 ') + (name || 'Unknown');
}

function getMediaLinks(m) {
  var media = m.media || {};
  var urls = media.urls || [];
  if (urls.length === 0) {
    return media.has_media ? '📎 ' + (media.type || 'media') : '—';
  }
  return urls.map(function(url, i) {
    var filename = url.split('/').pop();
    var icon = (media.type || '').startsWith('image') ? '🖼️' : (media.type || '').startsWith('audio') ? '🔊' : '📎';
    var label = urls.length > 1 ? (icon + ' ' + (media.type || 'file') + ' #' + (i+1)) : (icon + ' ' + (media.type || 'file'));
    return '<a href="' + escapeHtml(url) + '" target="_blank" class="media-link">' + label + '</a>';
  }).join(' ');
}

function topSenders(messages) {
  var map = {};
  for (var i = 0; i < messages.length; i++) {
    var m = messages[i];
    var name = m.sender && m.sender.name ? m.sender.name : 'Unknown';
    var senderId = m.sender && m.sender.id ? m.sender.id : '';
    var sourceLabel = m.source_label || '';
    var body = m.message && m.message.text ? m.message.text : '';
    var ts = m.timestamp || 0;
    var key = name + '::' + senderId + '::' + sourceLabel;
    if (!map[key]) {
      map[key] = { count: 0, lastMsg: body, lastTs: ts, sourceLabel: sourceLabel };
    }
    map[key].count += 1;
    if (ts > map[key].lastTs) {
      map[key].lastMsg = body;
      map[key].lastTs = ts;
    }
  }
  var entries = Object.entries(map);
  entries.sort(function(a, b) { return b[1].count - a[1].count; });
  return entries.slice(0, 5).map(function(item) {
    var key = item[0];
    var info = item[1];
    var parts = key.split('::');
    return { name: parts[0], senderId: parts[1] || '', sourceLabel: parts[2] || '', count: info.count, lastMsg: info.lastMsg };
  });
}

function renderMessages(messages, title) {
  var tbody = document.getElementById('messagesTable');
  var titleEl = document.getElementById('messagesTitle');
  titleEl.textContent = title || '📜 Messages';

  if (messages.length === 0) {
    tbody.innerHTML = '<tr><td colspan="6" class="no-data">No messages</td></tr>';
    return;
  }

  var html = '';
  for (var i = 0; i < messages.length; i++) {
    var m = messages[i];
    var ts = m.timestamp || m.received_at;
    var senderName = m.sender && m.sender.name ? m.sender.name : 'Unknown';
    var senderNum = (m.sender && m.sender.id ? m.sender.id : '').replace(/@.*/, '');
    var sourceLabel = m.source_label || '';
    var sourceNumber = m.source_number || '';
    var chatDisplay = getChatDisplay(m);
    var text = m.message && m.message.text ? m.message.text : '';
    var displayText = text.length > 150 ? text.substring(0, 150) + '…' : text;

    html += '<tr>' +
      '<td style="white-space:nowrap;font-size:12px">' + fmtDateShort(ts) + '</td>' +
      '<td><span class="sender-name">' + escapeHtml(senderName) + '</span>' +
      (senderNum ? '<br><span style="font-size:11px;color:#504060">' + senderNum + '</span>' : '') + '</td>' +
      '<td><span class="phone-tag">' + escapeHtml(sourceLabel) + '</span><br><span style="font-size:11px;color:#504060">' + escapeHtml(sourceNumber) + '</span></td>' +
      '<td><span class="chat-name">' + escapeHtml(chatDisplay) + '</span></td>' +
      '<td class="msg-text">' + escapeHtml(displayText) + '</td>' +
      '<td class="media-indicator">' + getMediaLinks(m) + '</td>' +
      '</tr>';
  }
  tbody.innerHTML = html;
}

// ── Main render ──
var allData = null;
var currentFilter = null;

function render(data) {
  allData = data;
  var messages = data.messages || [];
  var phones = data.phones || [];
  var contacts = data.contacts || [];
  var tasks = data.tasks || [];
  var total = messages.length;

  // Subtitle with phone info
  var phoneInfo = phones.map(function(p) { return p.label + ' (' + p.number + ')'; }).join(', ');
  document.getElementById('subtitle').textContent = 'Incoming messages — ' + phoneInfo;

  // Summary cards
  var withMedia = messages.filter(function(m) { return m.media && m.media.has_media; }).length;
  var uniqueSenders = new Set(messages.map(function(m) { return m.sender && m.sender.name ? m.sender.name : 'Unknown'; })).size;
  var uniqueChats = new Set(messages.map(function(m) { return m.chat ? (m.chat.name || m.chat.id) : ''; })).size;

  document.getElementById('summaryCards').innerHTML =
    '<div class="card"><div class="label">Total Messages</div><div class="value green">' + total + '</div></div>' +
    '<div class="card"><div class="label">With Media</div><div class="value cyan">' + withMedia + '</div></div>' +
    '<div class="card"><div class="label">Unique Senders</div><div class="value gold">' + uniqueSenders + '</div></div>' +
    '<div class="card"><div class="label">Chats</div><div class="value magenta">' + uniqueChats + '</div></div>';

  // Period breakdown
  var now = new Date();
  var periods = [
    { label: 'Past 7 Days', cutoff: new Date(now.getTime() - 7 * 86400000), id: '7d' },
    { label: 'Past 4 Weeks', cutoff: new Date(now.getTime() - 28 * 86400000), id: '4w' },
    { label: 'Past 6 Months', cutoff: new Date(now.getTime() - 180 * 86400000), id: '6m' },
  ];

  var periodsHtml = '';
  for (var pi = 0; pi < periods.length; pi++) {
    var p = periods[pi];
    var ts = typeof messages[0] && messages[0].timestamp;
    var filtered = messages.filter(function(m) { return new Date((typeof m.timestamp === 'number' ? m.timestamp * 1000 : m.timestamp)) >= p.cutoff; });
    var senders = topSenders(filtered);
    var listHtml = '';
    if (senders.length === 0) {
      listHtml = '<li class="no-data">No messages</li>';
    } else {
      for (var si = 0; si < senders.length; si++) {
        var s = senders[si];
        var encodedName = encodeURIComponent(s.name);
        var hash = '#' + encodedName + '::' + s.senderId + '::' + p.id;
        listHtml += '<li onclick="location.hash=\'' + hash + '\'"><div style="display:flex;flex-direction:column;gap:2px;width:100%">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span class="name">' + escapeHtml(s.name) + '</span>' +
          '<span class="count-badge">' + s.count + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:11px;color:#605070">' +
          '<span>' + (s.sourceLabel ? '📱 ' + escapeHtml(s.sourceLabel) : '') + '</span>' +
          '<span style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
          escapeHtml((s.lastMsg || '').substring(0, 40)) + '</span></div></div></li>';
      }
    }
    periodsHtml += '<div class="period-box">' +
      '<h3>' + p.label + '</h3>' +
      '<div class="count">' + filtered.length + ' messages</div>' +
      '<ul class="sender-list">' + listHtml + '</ul>' +
      '</div>';
  }
  document.getElementById('periodsContainer').innerHTML = periodsHtml;

  // All messages (sorted newest first, max 50)
  var sorted = messages.slice().sort(function(a, b) {
    var ta = typeof a.timestamp === 'number' ? a.timestamp : new Date(a.timestamp).getTime() / 1000;
    var tb = typeof b.timestamp === 'number' ? b.timestamp : new Date(b.timestamp).getTime() / 1000;
    return tb - ta;
  });
  var recent = sorted.slice(0, 50);
  renderMessages(recent, '📜 Last 50 Messages');

  document.getElementById('updatedAt').textContent = 'Last updated: ' + (data.updated_at || 'unknown') + ' · ' + total + ' messages captured';
}

// ── Filter ──
function applyFilter() {
  var hash = location.hash.slice(1);
  if (!hash || !allData) {
    document.getElementById('summaryCardsContainer').style.display = 'block';
    var fv = document.getElementById('filteredView');
    if (fv) fv.style.display = 'none';
    return;
  }
  // Re-render main view into filtered view
  clearFilter();
  location.hash = hash;
}

function clearFilter() {
  location.hash = '';
}

// ── Load ──
async function loadData() {
  try {
    var resp = await fetch(DATA_URL);
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    var data = await resp.json();
    document.getElementById('loading').style.display = 'none';
    document.getElementById('content').style.display = 'block';
    render(data);
  } catch(e) {
    document.getElementById('loading').style.display = 'none';
    document.getElementById('error').style.display = 'block';
    document.getElementById('error').innerHTML =
      '<div style="font-size:40px;margin-bottom:12px">⚠️</div>' +
      '<p>Could not load WhatsApp data.</p><p style="font-size:12px;margin-top:8px">' + e.message + '</p>' +
      '<p style="margin-top:20px"><a href="javascript:location.reload()" style="color:#25D366">Retry</a></p>';
  }
}

loadData();
</script>
</body>
</html>
