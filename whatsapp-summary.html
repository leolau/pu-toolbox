<meta charset="UTF-8">

<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {

  .back-link { display: inline-block; color: #25D366; cursor: pointer; font-size: 13px; margin-bottom: 16px; }
  .back-link:hover { text-decoration: underline; }

    gap: 16px;
    margin-bottom: 30px;
  }
  .card {

  .green { color: #25D366; }
  .gold { color: #c8b080; }
  .cyan { color: #50dcff; }
  .magenta { color: #ff70b4; }

  .periods {

    gap: 20px;
    margin-bottom: 30px;
  }
  .period-box {

    border-radius: 16px;
    padding: 20px;

  .period-box .count {
    font-size: 24px; font-weight: 700; color: #25D366; margin-bottom: 12px;
  }
  .sender-list { list-style: none; }
  .sender-list li {
    padding: 8px 0; border-bottom: 1px solid rgba(160,100,255,0.04);
    font-size: 13px; cursor: pointer; border-radius: 8px; transition: background 0.15s;
  }
  .sender-list li:hover { background: rgba(37,211,102,0.05); }
  .sender-list li:last-child { border-bottom: none; }
  .sender-list .name { color: #d0c8e0; font-weight: 500; }
  .sender-list .name:hover { color: #25D366; }
  .sender-list .count-badge {
    background: rgba(37, 211, 102, 0.1);
    color: #25D366;
    padding: 2px 10px;
    border-radius: 100px;
    font-size: 11px;
    font-weight: 600;
  }

  .section-title {
    font-size: 14px; color: #9080a0; text-transform: uppercase;
    letter-spacing: 2px; margin-bottom: 16px; margin-top: 10px;
  }
  .table-wrap { overflow-x: auto; margin-bottom: 30px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left; padding: 10px 12px; color: #605080;
    text-transform: uppercase; letter-spacing: 1px; font-size: 11px;
    border-bottom: 1px solid rgba(160,100,255,0.08);
    white-space: nowrap;
  }
  td {
    padding: 8px 12px; border-bottom: 1px solid rgba(160,100,255,0.04); color: #a098b0;
    vertical-align: top;
  }
  td.msg-text { max-width: 400px; word-break: break-word; white-space: pre-wrap; }
  td.media-indicator { color: #50dcff; }
  .media-link {
    color: #50dcff; text-decoration: none; font-size: 12px;
    display: inline-block; padding: 2px 8px; margin: 1px 0;
    background: rgba(80,220,255,0.08); border-radius: 4px;
  }
  .media-link:hover { background: rgba(80,220,255,0.2); text-decoration: underline; }
  .tag {
    display: inline-block; padding: 2px 10px; border-radius: 100px;
    font-size: 11px; background: rgba(160,100,255,0.1); color: #a064ff;
  }
  .tag.group { background: rgba(37,211,102,0.1); color: #25D366; }
  .chat-name { font-size: 12px; color: #706080; }
  .sender-name { color: #d0c8e0; font-weight: 500; }
  .no-data { text-align: center; color: #504060; padding: 40px; }
  .filter-hint { color: #504060; font-size: 12px; font-style: italic; margin-bottom: 8px; }
</style>
</head>

// ── Helpers ──
const NOW = new Date('2026-07-01T12:53:00Z');
const SEVEN_DAYS_AGO = new Date(NOW.getTime() - 7 * 86400000);
const FOUR_WEEKS_AGO = new Date(NOW.getTime() - 28 * 86400000);
const SIX_MONTHS_AGO = new Date(NOW.getTime() - 180 * 86400000);

const PERIODS = [
  { label: 'Past 7 Days', cutoff: SEVEN_DAYS_AGO, id: '7d' },
  { label: 'Past 4 Weeks', cutoff: FOUR_WEEKS_AGO, id: '4w' },
  { label: 'Past 6 Months', cutoff: SIX_MONTHS_AGO, id: '6m' },
];

const LOCAL_BASE = (location.hostname === 'localhost' || location.hostname === '127.0.0.1')
  ? location.origin + '/' : null;

function fmtDateShort(ts) {
  const d = new Date(ts * 1000);
  return d.toLocaleString('en-CA', { timeZone:'Asia/Hong_Kong',
    month:'short', day:'numeric', hour:'2-digit', minute:'2-digit' });
}

function escapeHtml(text) {
  const div = document.createElement('div');
  div.textContent = text || '';
  return div.innerHTML;
}

function getSenderKey(m) {
  const name = m.raw?.senderName || m.sender?.name || 'Unknown';
  const id = m.raw?.senderId || m.sender?.id || '';
  return escapeHtml(name) + '::' + id;
}

function getSenderName(m) {
  return m.raw?.senderName || m.sender?.name || 'Unknown';
}

function getChatDisplay(m) {
  const chatName = m.raw?.chatName || '';
  const isGroup = m.raw?.isGroup || m.chat?.is_group || false;
  const chatId = m.raw?.chatId || m.chat?.id || '';
  const display = chatName || chatId.replace(/@.*/, '') || 'Unknown';
  const tag = isGroup ? '👥 ' : '💬 ';
  return tag + display;
}

function hasMedia(m) {
  const urls = m.raw?.mediaUrls || [];
  return urls.length > 0 || m.raw?.hasMedia || !!(m.message?.text || '').match(/^\[(image|video|audio|document)/);
}

function getMediaType(m) {
  return m.raw?.mediaType || (m.message?.text || '').match(/^\[(\w+)/)?.[1] || '';
}

function mediaUrl(m) {
  const urls = m.raw?.mediaUrls || [];
  return urls;
}

function buildMediaLinks(m) {
  const urls = m.raw?.mediaUrls || [];
  if (urls.length === 0) {
    // No file URLs, show type indicator
    const mt = getMediaType(m);
    return mt ? '📎 ' + mt : '—';
  }
  return urls.map((url, i) => {
    const filename = url.split('/').pop();
    const mt = getMediaType(m) || filename.split('.').pop() || 'file';
    // Build absolute URL if local server is available
    const href = LOCAL_BASE ? LOCAL_BASE + url : url;
    const icon = mt.startsWith('image') ? '🖼️' : mt.startsWith('audio') ? '🔊' : mt.startsWith('video') ? '🎬' : '📎';
    const label = urls.length > 1 ? (icon + ' ' + mt + ' #' + (i+1)) : (icon + ' ' + mt);
    return '<a href="' + escapeHtml(href) + '" target="_blank" class="media-link">' + label + '</a>';
  }).join(' ');
}

function topSenders(messages) {
  const map = {};
  for (const m of messages) {
    const name = getSenderName(m);
    const senderId = m.raw?.senderId || m.sender?.id || '';
    const body = m.raw?.body || m.message?.text || '';
    const ts = m.timestamp || 0;
    const key = name + '::' + senderId;
    if (!map[key]) {
      map[key] = { count: 0, lastMsg: body, lastTs: ts };
    }
    map[key].count += 1;
    if (ts > map[key].lastTs) {
      map[key].lastMsg = body;
      map[key].lastTs = ts;
    }
  }
  return Object.entries(map)
    .sort((a, b) => b[1].count - a[1].count)
    .slice(0, 5)
    .map(([key, info]) => {
      const [name, id] = key.split('::');
      const number = id.replace(/@.*/, '');
      return { name: name, senderId: id, number, ...info };
    });
}

// ── Render messages table ──
function renderMessages(messages, title) {
  const tbody = document.getElementById('messagesTable');
  const titleEl = document.getElementById('messagesTitle');

  titleEl.textContent = title || '📜 Messages';

  if (messages.length === 0) {
    tbody.innerHTML = '<tr><td colspan="5" class="no-data">No messages</td></tr>';
    return;
  }

  let html = '';
  for (const m of messages) {
    const ts = m.timestamp || (new Date(m.received_at).getTime() / 1000);
    const senderName = getSenderName(m);
    const senderNum = (m.raw?.senderId || m.sender?.id || '').replace(/@.*/, '');
    const chatDisplay = getChatDisplay(m);
    const text = m.raw?.body || m.message?.text || '';
    const displayText = text.length > 150 ? text.substring(0, 150) + '…' : text;

    html += '<tr>' +
      '<td style="white-space:nowrap;font-size:12px">' + fmtDateShort(ts) + '</td>' +
      '<td><span class="sender-name">' + escapeHtml(senderName) + '</span>' +
      (senderNum ? '<br><span style="font-size:11px;color:#504060">' + senderNum + '</span>' : '') + '</td>' +
      '<td><span class="chat-name">' + escapeHtml(chatDisplay) + '</span></td>' +
      '<td class="msg-text">' + escapeHtml(displayText) + '</td>' +
      '<td class="media-indicator">' + buildMediaLinks(m) + '</td>' +
      '</tr>';
  }
  tbody.innerHTML = html;
}

// ── Apply sender filter ──
let currentFilter = null;

function applyFilter() {
  const hash = location.hash.slice(1);
  const container = document.getElementById('summaryCardsContainer');
  const backLink = document.getElementById('filterBackLink');

  if (!hash) {
    currentFilter = null;
    if (backLink) backLink.style.display = 'none';
    container.style.display = 'block';
    renderMainView();
    return;
  }

  // Parse hash: #senderName::senderId::periodId
  const parts = hash.split('::');
  if (parts.length < 2) {
    container.style.display = 'block';
    renderMainView();
    return;
  }

  const filterName = decodeURIComponent(parts[0]);
  const filterId = parts[1];
  const periodId = parts[2] || '';

  // Determine period cutoff
  let cutoff = null;
  let periodLabel = '';
  for (const p of PERIODS) {
    if (p.id === periodId) { cutoff = p.cutoff; periodLabel = p.label; break; }
  }

  // Filter messages
  const filtered = MESSAGES_DATA.filter(m => {
    const name = m.raw?.senderName || m.sender?.name || 'Unknown';
    const id = m.raw?.senderId || m.sender?.id || '';
    if (name !== filterName && id !== filterId) return false;
    if (cutoff && new Date(m.timestamp * 1000) < cutoff) return false;
    return true;
  });

  currentFilter = { name: filterName, count: filtered.length, period: periodLabel };

  container.style.display = 'none';

  // Show filtered view
  const app = document.getElementById('app');
  let existing = document.getElementById('filteredView');
  if (!existing) {
    existing = document.createElement('div');
    existing.id = 'filteredView';
    app.appendChild(existing);
  }

  let backHtml = '<a class="back-link" onclick="clearFilter()">← Back to overview</a>';
  let title = 'Messages from ' + escapeHtml(filterName);
  if (periodLabel) title += ' (' + periodLabel + ')';
  title += ' — ' + filtered.length + ' messages';

  existing.innerHTML = backHtml +
    '<h2 class="section-title">' + title + '</h2>' +
    '<div class="table-wrap"><table><thead><tr>' +
    '<th>Time</th><th>Sender</th><th>Chat</th><th>Message</th><th>Media</th>' +
    '</tr></thead><tbody id="filteredTable"></tbody></table></div>';

  const fbody = document.getElementById('filteredTable');
  if (filtered.length === 0) {
    fbody.innerHTML = '<tr><td colspan="5" class="no-data">No messages</td></tr>';
  } else {
    let html = '';
    // Show chronologically (oldest first)
    const sorted = filtered.slice().sort((a, b) => (a.timestamp || 0) - (b.timestamp || 0));
    for (const m of sorted) {
      const ts = m.timestamp || 0;
      const senderName = getSenderName(m);
      const senderNum = (m.raw?.senderId || m.sender?.id || '').replace(/@.*/, '');
      const chatDisplay = getChatDisplay(m);
      const text = m.raw?.body || m.message?.text || '';
      const displayText = text.length > 150 ? text.substring(0, 150) + '…' : text;
      html += '<tr>' +
        '<td style="white-space:nowrap;font-size:12px">' + fmtDateShort(ts) + '</td>' +
        '<td><span class="sender-name">' + escapeHtml(senderName) + '</span>' +
        (senderNum ? '<br><span style="font-size:11px;color:#504060">' + senderNum + '</span>' : '') + '</td>' +
        '<td><span class="chat-name">' + escapeHtml(chatDisplay) + '</span></td>' +
        '<td class="msg-text">' + escapeHtml(displayText) + '</td>' +
        '<td class="media-indicator">' + buildMediaLinks(m) + '</td>' +
        '</tr>';
    }
    fbody.innerHTML = html;
  }
}

function clearFilter() {
  location.hash = '';
}

window.addEventListener('hashchange', applyFilter);

// ── Main view ──
function renderMainView() {
  const messages = MESSAGES_DATA;
  const total = messages.length;
  const withMedia = messages.filter(hasMedia).length;
  const uniqueSenders = new Set(messages.map(m => m.raw?.senderName || m.sender?.name || 'Unknown')).size;
  const uniqueChats = new Set(messages.map(m => m.chat?.id || m.raw?.chatId)).size;

  document.getElementById('summaryCards').innerHTML =
    '<div class="card"><div class="label">Total Messages</div><div class="value green">' + total + '</div></div>' +
    '<div class="card"><div class="label">With Media</div><div class="value cyan">' + withMedia + '</div></div>' +
    '<div class="card"><div class="label">Unique Senders</div><div class="value gold">' + uniqueSenders + '</div></div>' +
    '<div class="card"><div class="label">Chats</div><div class="value magenta">' + uniqueChats + '</div></div>';

  // Period breakdown
  let periodsHtml = '';
  for (const p of PERIODS) {
    const filtered = messages.filter(m => new Date(m.timestamp * 1000) >= p.cutoff);
    const senders = topSenders(filtered);
    let listHtml = '';
    if (senders.length === 0) {
      listHtml = '<li class="no-data">No messages</li>';
    } else {
      for (const s of senders) {
        const encodedName = encodeURIComponent(s.name);
        const hash = '#' + encodedName + '::' + s.senderId + '::' + p.id;
        listHtml += '<li onclick="location.hash=\'' + hash + '\'"><div style="display:flex;flex-direction:column;gap:2px;width:100%">' +
          '<div style="display:flex;justify-content:space-between;align-items:center">' +
          '<span class="name">' + escapeHtml(s.name) + '</span>' +
          '<span class="count-badge">' + s.count + '</span></div>' +
          '<div style="display:flex;justify-content:space-between;font-size:11px;color:#605070">' +
          '<span>' + (s.number ? '📱 ' + s.number : '') + '</span>' +
          '<span style="max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">' +
          escapeHtml((s.lastMsg || '').substring(0, 40)) + '</span></div></div></li>';
      }
    }
    periodsHtml += '<div class="period-box">' +
      '<h3>' + p.label + '</h3>' +
      '<div class="count">' + filtered.length + ' messages</div>' +
      '<ul class="sender-list">' + listHtml + '</ul>' +
      '</div>';
  }
  document.getElementById('periodsContainer').innerHTML = periodsHtml;

  // Last 30 messages
  const last30 = messages.slice(-30).reverse();
  renderMessages(last30, '📜 Last 30 Messages');

  document.getElementById('updatedAt').textContent = 'Last updated: 2026-07-01 12:53 UTC · ' + total + ' messages captured';
}

// ── Init ──
// Check if there's a hash filter on load
if (location.hash) {
  applyFilter();
} else {
  renderMainView();
}
</script>
</body>
</html>
